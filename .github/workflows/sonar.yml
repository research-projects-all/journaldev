name: SonarCloud

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: Analyze Java and Spring sources
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile Maven projects that can be compiled
        shell: bash
        run: |
          set -uo pipefail

          : > compiled-projects.txt
          : > failed-projects.txt

          while IFS= read -r pom; do
            project_dir="$(dirname "$pom")"
            echo "Compiling ${project_dir}"

            if mvn -B -f "$pom" -DskipTests -DskipITs clean compile; then
              if [ -d "${project_dir}/target/classes" ]; then
                echo "${project_dir}/target/classes" >> compiled-projects.txt
              fi
            else
              echo "${project_dir}" >> failed-projects.txt
            fi
          done < <(find . -name pom.xml -not -path '*/target/*' | sort)

          if [ ! -s compiled-projects.txt ]; then
            echo "No Maven project produced target/classes. Sonar Java analysis needs compiled classes."
            exit 1
          fi

          java_binaries="$(paste -sd, compiled-projects.txt)"

          cat > sonar-project.properties <<EOF_PROPS
          sonar.organization=research-projects-all
          sonar.projectKey=research-projects-all_journaldev
          sonar.projectName=journaldev
          sonar.sources=.
          sonar.java.binaries=${java_binaries}
          sonar.exclusions=**/target/**,**/.mvn/**,**/mvnw,**/mvnw.cmd,**/gradlew,**/gradlew.bat,**/build/**,**/.gradle/**,**/LogoDesigns/**
          EOF_PROPS

          echo "Compiled projects:"
          cat compiled-projects.txt

          if [ -s failed-projects.txt ]; then
            echo "Projects that did not compile. They will still be scanned as sources, but semantic Java rules may be limited for them:"
            cat failed-projects.txt
          fi

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
